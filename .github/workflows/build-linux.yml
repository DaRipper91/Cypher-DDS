name: Build Linux AppImage

# Runs on ubuntu-22.04, not ubuntu-latest, because an AppImage links against
# whatever glibc the build machine has and only runs forward — built on an
# older glibc it works everywhere newer, built on a newer one it breaks on
# older distros. 22.04 is the oldest Ubuntu GitHub still offers as a hosted
# runner, so it's the widest-compatibility choice available here.
#
# Ships one self-contained cypher-dds-x86_64.AppImage that runs unmodified
# across Ubuntu, Fedora, Arch, Debian, openSUSE, etc. — deliberately not
# per-distro .deb/.rpm/pacman packages, which would mean separate packaging
# metadata and maintainer scripts to write and keep working for each distro
# family. Builds the TUI (src/cypher_dds/tui/app.py via cypher-dds.spec),
# same entry point build-windows.yml packages — add a second job here for
# cypher_dds.gui once that module exists (see PROJECT_STATUS.md).

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore: ["**.md"]
  workflow_dispatch: {}

jobs:
  build-linux-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build with PyInstaller
        run: pyinstaller cypher-dds.spec

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/cypher-dds AppDir/usr/bin/cypher-dds
          cat > AppDir/cypher-dds.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Cypher-DDS
          Comment=OBD2 diagnostic TUI for talking to vehicles over USB/Bluetooth ELM327 adapters
          Exec=cypher-dds
          Icon=cypher-dds
          Categories=Utility;
          Terminal=true
          EOF
          # Solid Royal Blue square (cypher_dds.theme.ROYAL_BLUE) — a real
          # icon design is future work, this just satisfies appimagetool's
          # requirement for an <appname>.png at the AppDir root.
          convert -size 256x256 xc:'#4169E1' AppDir/cypher-dds.png

      - name: Download appimagetool
        run: |
          curl -L -o appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          mkdir -p dist
          ./appimagetool --appimage-extract-and-run AppDir dist/cypher-dds-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypher-dds-linux
          path: dist/cypher-dds-x86_64.AppImage
