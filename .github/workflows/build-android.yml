name: Build Android APK

# Runs on ubuntu-latest via ArtemSBulgakov/buildozer-action, which drives
# the official Buildozer Docker image (Android SDK/NDK/python-for-android
# toolchain included). There's no Android build toolchain in this repo's
# dev environment, so this CI run is the real build *and* verification
# step for the APK — see src/cypher_dds/mobile/app.py for what a green
# build here does and doesn't prove.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypher-dds-android
          path: ${{ steps.buildozer.outputs.filename }}
