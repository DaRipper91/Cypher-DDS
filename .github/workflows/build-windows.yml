name: Build Windows executable

# Runs on windows-latest because PyInstaller must build on the target OS —
# there's no reliable way to cross-compile a native .exe from Linux. This
# CI run is the actual build *and* verification step for cypher-dds.exe.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore: ["**.md"]
  workflow_dispatch: {}

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build TUI executable
        run: pyinstaller cypher-dds.spec

      - name: Build GUI executable
        run: pyinstaller cypher-dds-gui.spec

      - name: Upload TUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypher-dds-windows
          path: dist/cypher-dds.exe

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypher-dds-gui-windows
          path: dist/cypher-dds-gui.exe
